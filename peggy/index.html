<style>
:root{
  --teal:#48C4CC;--teal-deep:#2A8FA5;--teal-glow:rgba(72,196,204,.18);
  --pink:#EF3295;--pink-deep:#C0207A;--pink-glow:rgba(239,50,149,.18);
  --charcoal:#0F1620;--charcoal-2:#141C28;--card-bg:#1A2330;
  --card-elevated:#232E3D;--border:rgba(72,196,204,.18);
  --border-strong:rgba(72,196,204,.4);--border-pink:rgba(239,50,149,.25);
  --text-primary:#FFFFFF;--text-secondary:rgba(255,255,255,.65);
  --text-muted:rgba(255,255,255,.4);--green:#1DBE7E;--yellow:#F2B600;--red:#E5484D;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--charcoal);color:var(--text-primary);font-family:'DM Sans',-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
body{max-width:480px;margin:0 auto;position:relative;padding-bottom:60px}
@media(min-width:481px){html{background:#080f18}body{box-shadow:0 0 0 1px rgba(72,196,204,.15),0 0 80px rgba(0,0,0,.75);min-height:100vh}}
@media(min-width:768px){html{display:flex;align-items:flex-start;justify-content:center}body{margin:20px auto;border-radius:16px;overflow:hidden;min-height:calc(100vh - 40px)}}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:transparent;color:inherit}
input,select{font-family:inherit;outline:none;border:none;background:transparent;color:inherit;-webkit-appearance:none}
.serif{font-family:'DM Serif Display',serif;font-weight:400}
.app-header{position:relative;background:linear-gradient(160deg,var(--charcoal) 0%,var(--charcoal-2) 60%,#0a1018 100%);padding:18px 18px 0;overflow:hidden;border-bottom:1px solid var(--border)}
.app-header::before{content:"";position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,var(--teal-glow) 0%,transparent 70%);pointer-events:none}
.app-header::after{content:"";position:absolute;bottom:-80px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,var(--pink-glow) 0%,transparent 70%);pointer-events:none}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:2}
.logo-wrap{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--pink));padding:2px;flex-shrink:0;box-shadow:0 4px 18px rgba(72,196,204,.35)}
.logo{width:100%;height:100%;border-radius:10px;object-fit:cover;background:#fff;padding:3px;display:block}
.brand-block{flex:1;min-width:0}
.brand-tag{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--teal);text-transform:uppercase}
.brand-title{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.05;color:#fff;letter-spacing:-.01em;margin-top:2px}
.brand-sub{font-size:11px;color:var(--pink);font-weight:600;letter-spacing:.5px;margin-top:3px}
.countdown{background:linear-gradient(135deg,rgba(239,50,149,.25),rgba(239,50,149,.08));border:1px solid var(--border-pink);border-radius:12px;padding:8px 10px;text-align:center;min-width:62px;box-shadow:0 4px 14px rgba(239,50,149,.15)}
.countdown .num{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1}
.countdown .lbl{font-size:9px;font-weight:700;color:var(--pink);letter-spacing:1.2px;margin-top:3px;text-transform:uppercase}
.comp-strip{position:relative;z-index:2;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.comp-strip .ttl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.comp-strip .nm{font-size:13px;color:var(--text-primary);font-weight:600;margin-top:2px}
.comp-strip .progress{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:0 12px;max-width:120px}
.comp-strip .fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--pink));border-radius:3px;transition:width .8s ease}
.comp-strip .pct{font-size:11px;color:var(--teal);font-weight:700}
.sync-indicator{position:absolute;top:18px;right:18px;z-index:3;display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;opacity:0;transition:opacity .3s}
.sync-indicator.show{opacity:1}
.sync-indicator .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.sync-indicator.offline .dot{background:var(--red);box-shadow:0 0 8px var(--red)}
.sync-indicator.syncing .dot{background:var(--yellow);box-shadow:0 0 8px var(--yellow);animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.profile-card{margin:16px;background:linear-gradient(135deg,rgba(72,196,204,.08),rgba(239,50,149,.05));border:1px solid var(--border-strong);border-radius:16px;overflow:hidden}
.profile-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
.profile-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);font-weight:700}
.profile-title{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;line-height:1.1;margin-top:4px}
.profile-sub{font-size:11px;color:var(--text-secondary);margin-top:3px;font-weight:500}
.profile-body{padding:14px 16px}
.profile-section{margin-bottom:12px}
.profile-section:last-child{margin-bottom:0}
.profile-section .lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.profile-section .lbl.teal{color:var(--teal)}
.profile-section .lbl.pink{color:var(--pink)}
.profile-section .lbl::before{content:"";width:3px;height:11px;border-radius:2px;background:currentColor}
.profile-section p{font-size:12.5px;color:var(--text-secondary);line-height:1.5}
.profile-section .strong{color:var(--text-primary);font-weight:600}
.profile-pillars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.pillar{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
.pillar .ph{font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.pillar.s .ph{color:var(--teal)}
.pillar.w .ph{color:var(--pink)}
.pillar .pb{font-size:11px;color:var(--text-secondary);line-height:1.4}
.block-arc{background:linear-gradient(135deg,rgba(239,50,149,.12),rgba(72,196,204,.06));border:1px solid var(--border-pink);border-radius:12px;padding:12px 14px;margin-top:4px}
.block-arc .ah{font-family:'DM Serif Display',serif;font-size:14px;color:#fff;margin-bottom:6px}
.block-arc .ai{font-size:11.5px;color:var(--text-secondary);line-height:1.55}
.block-arc .ai strong{color:var(--teal);font-weight:600}
.block-arc .ai em{color:var(--pink);font-style:normal;font-weight:600}
.stat-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 4px}
.stat{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:11px 8px;text-align:center}
.stat .val{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1}
.stat .lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-muted);margin-top:5px;text-transform:uppercase}
.stat.teal .val{color:var(--teal)}
.stat.pink .val{color:var(--pink)}
.view-tabs{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.view-tabs::-webkit-scrollbar{display:none}
.view-tab{flex-shrink:0;background:var(--card-bg);border:1px solid var(--border);color:var(--text-muted);font-family:inherit;font-weight:600;font-size:12px;padding:10px 16px;border-radius:20px;cursor:pointer;white-space:nowrap;letter-spacing:.3px;transition:all .2s}
.view-tab.active{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(72,196,204,.3)}
.content{padding:14px 16px 0}
.event-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:border-color .2s}
.event-card:hover{border-color:var(--border-strong)}
.event-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.event-head .name{font-family:'DM Serif Display',serif;font-size:17px;color:#fff;line-height:1.15}
.event-head .meta{font-size:10px;color:var(--text-muted);margin-top:4px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.badge{padding:6px 10px;border-radius:8px;font-size:11px;font-weight:800;white-space:nowrap;letter-spacing:.3px}
.badge.green{background:rgba(29,190,126,.15);color:var(--green);border:1px solid rgba(29,190,126,.3)}
.badge.yellow{background:rgba(242,182,0,.15);color:var(--yellow);border:1px solid rgba(242,182,0,.3)}
.badge.red{background:rgba(229,72,77,.15);color:#ff7478;border:1px solid rgba(229,72,77,.3)}
.badge.gray{background:rgba(255,255,255,.05);color:var(--text-muted);border:1px solid rgba(255,255,255,.08)}
.scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.score-box{background:var(--card-elevated);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.score-box.gold{border-color:rgba(242,182,0,.35);background:linear-gradient(135deg,rgba(242,182,0,.1),rgba(242,182,0,.02))}
.score-box .lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase}
.score-box.gold .lbl{color:var(--yellow)}
.score-box .val{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-top:3px;line-height:1}
.score-box .sub{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:500}
.podium{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:9px 11px;margin-bottom:10px}
.podium .ph{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
.podium-row{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.podium-row:last-child{border-bottom:0}
.podium-row .place{font-weight:800;width:54px;font-size:10px;letter-spacing:.5px}
.podium-row .place.g{color:var(--yellow)}
.podium-row .place.s{color:#B8C2D0}
.podium-row .place.b{color:#CD9B6A}
.podium-row .who{flex:1;color:var(--text-secondary);font-weight:500}
.podium-row .sc{font-weight:700;color:#fff}
.input-row{display:flex;gap:6px;align-items:stretch}
.input-row input,.input-row select{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;font-weight:600;color:#fff;background:var(--card-elevated);min-width:0}
.input-row input::placeholder{color:var(--text-muted)}
.input-row input:focus,.input-row select:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow)}
.input-row select option{background:var(--card-elevated);color:#fff}
.input-row button{background:linear-gradient(135deg,var(--pink),var(--pink-deep));border:0;color:#fff;font-family:inherit;font-weight:800;font-size:12px;padding:0 18px;border-radius:10px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;box-shadow:0 3px 12px rgba(239,50,149,.3)}
.input-row button:active{transform:scale(.97)}
.input-row button:disabled{opacity:.5;cursor:not-allowed}
.dash-row{display:flex;justify-content:space-between;align-items:center;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;gap:10px}
.dash-row .info{flex:1;min-width:0}
.dash-row .nm{font-size:13.5px;font-weight:700;color:#fff}
.dash-row .sb{font-size:10px;color:var(--text-muted);margin-top:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.dash-row .vals{text-align:right}
.dash-row .you{font-family:'DM Serif Display',serif;font-size:17px;color:#fff;line-height:1}
.dash-row .gold{font-size:10px;color:var(--yellow);margin-top:2px;font-weight:600}
.hist-day{margin-bottom:16px}
.hist-day .date{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--pink);text-transform:uppercase;margin-bottom:8px;padding-left:4px}
.hist-row{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.hist-row .ev{font-size:13px;font-weight:600;color:#fff}
.hist-row .sc{font-size:14px;font-weight:800;color:#fff;font-family:'DM Serif Display',serif}
.hist-row .pr{display:inline-block;background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;font-size:8px;font-weight:800;padding:3px 6px;border-radius:4px;margin-left:6px;letter-spacing:.8px;vertical-align:middle}
.empty{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty .ico{font-size:42px;margin-bottom:8px;opacity:.4}
.empty .msg{font-size:13px;font-weight:500}
.loading-screen{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:12px}
.loading-screen .spinner{width:40px;height:40px;border:3px solid rgba(72,196,204,.2);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen .lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase}
.loading-screen.hidden{display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card-elevated);border:1px solid var(--border-strong);color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:700;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;letter-spacing:.5px}
.toast.show{opacity:1}
.toast.pr{background:linear-gradient(135deg,var(--pink),var(--pink-deep));border-color:transparent;box-shadow:0 8px 32px rgba(239,50,149,.4)}
.foot{padding:18px;text-align:center}
.foot button{background:none;border:0;color:var(--text-muted);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;text-decoration:underline}
</style>
</head>

const PEGGY={
  name:'Peggy',division:'Women 70–74',
  background:`Four to five years of Senior Games experience. <span class="strong">Gold in Overhead Hang (2:27)</span> — she sets the standard the rest of Women 70–74 is chasing. Three Silver medals in 2025: Med Ball Slams, Dynamax Throw, and Bench Press. Six events produced no medal. The experience is real — she knows these events, the competition, the pressure. Year over year in the same division, same weights. 2026 is about converting that experience into a wider podium.`,
  loads:{prowler:'2×25 lb plates',kbsquat:'12 kg',dynamax:'4 lb',bench:'45 lb',hang:'Bodyweight',slams:'10 lb',jumprope:'BW',broadjump:'BW',row:'500m',shuttle:'BW'},
  strong:'Overhead Hang Gold (2:27) — the best in the division. Three Silver medals show consistent top-three presence. Competition-hardened across 4–5 years of Senior Games.',
  weak:'Six events with no medal in 2025: Prowler Push, KB Box Squat, Jump Rope, Standing Broad Jump, Concept Row, 300 Yd Shuttle. Six unmedaled events represent the entire upside for 2026.',
  arc:{
    title:'Where this block takes her',
    body:'Same division, same weights, same field — every gain is earned. Hang Gold at <strong>2:27</strong> is the benchmark to defend and extend. Med Ball Slams and Dynamax are Silver — one strong session away from Gold each. Bench is <em>Silver at 12 reps vs Gold of 38</em> — significant gap to close. <strong>Target: 6+ medals in 2026.</strong> The six unseeded events are where this year gets decided.'
  },
  podium:{
    prowler:[['GOLD','Bolduc, C.','0:26'],['SILVER','Currier, C.','0:34'],['BRONZE','Garrett, S.','0:38']],
    kbsquat:[['GOLD','Green, M.','30'],['SILVER','Bolduc, C.','23'],['BRONZE','Currier, C.','15']],
    dynamax:[['GOLD','Currier, C.','265'],['SILVER','Happ, P.','198'],['BRONZE','—','—']],
    bench:[['GOLD','Green, M.','38'],['SILVER','Happ, P.','12'],['BRONZE','Currier, C.','8']],
    hang:[['GOLD','Happ, P.','2:27'],['SILVER','Bolduc, C.','0:45'],['BRONZE','Currier, C.','0:21']],
    slams:[['GOLD','Bolduc, C.','36'],['SILVER','Happ, P.','30'],['BRONZE','Currier, C.','29']],
    jumprope:[['GOLD','Bolduc, C.','67'],['SILVER','—','—'],['BRONZE','—','—']],
    broadjump:[['GOLD','Currier, C.','39'],['SILVER','—','—'],['BRONZE','—','—']],
    row:[['GOLD','Green, M.','2:21'],['SILVER','Bolduc, C.','2:28'],['BRONZE','Garrett, S.','2:35']],
    shuttle:[['GOLD','Green, M.','1:52'],['SILVER','—','—'],['BRONZE','—','—']],
  },
  baselines:[
    {event:'hang',value:'2:27',date:'2025-09-21',note:'2025 comp · Gold in 70–74'},
    {event:'slams',value:'30',date:'2025-09-21',note:'2025 comp · Silver in 70–74'},
    {event:'dynamax',value:'198',date:'2025-09-21',note:'2025 comp · Silver in 70–74'},
    {event:'bench',value:'12',date:'2025-09-21',note:'2025 comp · Silver in 70–74'},
  ]
};

let currentView='log',cachedLogs=[];

async function sbFetch(path,opts={}){
  const url=SUPABASE_URL+'/rest/v1'+path;
  const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})};
  const res=await fetch(url,{...opts,headers});
  if(!res.ok){throw new Error('Supabase '+res.status+': '+(await res.text()))}
  const ct=res.headers.get('content-type')||'';
  return ct.includes('application/json')?res.json():null;
}
async function loadLogs(){
  const data=await sbFetch('/sdsg_logs?athlete_slug=eq.'+ATHLETE_SLUG+'&select=*&order=log_date.asc,created_at.asc');
  return data.map(r=>({event:r.event,value:r.value,date:r.log_date,note:r.note||'',id:r.id}));
}
async function insertLog(event,value,date,note){
  const body=JSON.stringify([{athlete_slug:ATHLETE_SLUG,event,value:String(value),log_date:date,note:note||null}]);
  const res=await sbFetch('/sdsg_logs',{method:'POST',body});return res?.[0];
}
async function deleteAllLogs(){await sbFetch('/sdsg_logs?athlete_slug=eq.'+ATHLETE_SLUG,{method:'DELETE'});}
async function ensureBaselines(){
  if(cachedLogs.length>0)return;
  setSyncStatus('syncing','Seeding');
  const rows=PEGGY.baselines.map(b=>({athlete_slug:ATHLETE_SLUG,event:b.event,value:String(b.value),log_date:b.date,note:b.note||null}));
  await sbFetch('/sdsg_logs',{method:'POST',body:JSON.stringify(rows)});
  cachedLogs=await loadLogs();
}
// === END CANONICAL SUPABASE BLOCK ===
function parseTime(t){
  if(typeof t==='number')return t;if(!t)return null;
  const s=String(t).trim();
  if(s.includes(':')){const[m,sec]=s.split(':');return parseFloat(m)*60+parseFloat(sec)}
  return parseFloat(s);
}
function formatTime(sec){
  if(sec==null||isNaN(sec))return '—';
  const m=Math.floor(sec/60),s=(sec-m*60);
  return m+':'+(s<10?'0':'')+s.toFixed(s%1?1:0);
}
function fmtVal(ev,v){
  if(v==null||v==='')return '—';
  const cfg=EVENTS[ev];
  if(cfg.unit==='time'){if(typeof v==='string'&&v.includes(':'))return v;return formatTime(parseTime(v))}
  return String(v);
}
function bestScore(ev){
  const logs=cachedLogs.filter(l=>l.event===ev&&l.value!=null&&l.value!=='');
  if(!logs.length)return null;const cfg=EVENTS[ev];const parser=cfg.unit==='time'?parseTime:parseFloat;
  const vals=logs.map(l=>({...l,n:parser(l.value)})).filter(l=>!isNaN(l.n));
  if(!vals.length)return null;vals.sort((a,b)=>cfg.lowerBetter?a.n-b.n:b.n-a.n);return vals[0];
}
function goldDelta(ev){
  const best=bestScore(ev);if(!best)return null;
  const goldRaw=PEGGY.podium[ev]?.[0]?.[2];if(!goldRaw||goldRaw==='—')return null;
  const cfg=EVENTS[ev];
  const b=cfg.unit==='time'?parseTime(best.value):parseFloat(best.value);
  const g=cfg.unit==='time'?parseTime(goldRaw):parseFloat(goldRaw);
  if(isNaN(b)||isNaN(g))return null;
  let pct;if(cfg.lowerBetter){pct=((g-b)/g)*100}else{pct=((b-g)/g)*100}
  return{pct,gold:goldRaw,best:best.value};
}
function deltaBadge(ev){
  const d=goldDelta(ev);if(!d)return '<span class="badge gray">No Data</span>';
  const cls=d.pct>=10?'green':d.pct>=0?'yellow':'red';
  const sign=d.pct>=0?'+':'';
  return '<span class="badge '+cls+'">'+sign+d.pct.toFixed(1)+'%</span>';
}
function renderProfile(){
  document.getElementById('profileCard').innerHTML=`
    <div class="profile-head">
      <div class="profile-tag">Athlete Profile</div>
      <div class="profile-title">${PEGGY.name}</div>
      <div class="profile-sub">${PEGGY.division} · 4–5 Year Senior Games Competitor</div>
    </div>
    <div class="profile-body">
      <div class="profile-section"><div class="lbl teal">Background</div><p>${PEGGY.background}</p></div>
      <div class="profile-pillars">
        <div class="pillar s"><div class="ph">Strengths</div><div class="pb">${PEGGY.strong}</div></div>
        <div class="pillar w"><div class="ph">Focus Areas</div><div class="pb">${PEGGY.weak}</div></div>
      </div>
      <div class="profile-section" style="margin-top:14px">
        <div class="block-arc">
          <div class="ah">${PEGGY.arc.title}</div>
          <div class="ai">${PEGGY.arc.body}</div>
        </div>
      </div>
    </div>`;
}
function renderEventCard(ev){
  const cfg=EVENTS[ev],best=bestScore(ev),podium=PEGGY.podium[ev]||[],load=PEGGY.loads[ev]||'';
  let inputCtl='';
  if(cfg.unit==='reps'){let opts='<option value="">Select reps</option>';for(let i=1;i<=200;i++)opts+='<option value="'+i+'">'+i+' reps</option>';inputCtl='<select id="in_'+ev+'">'+opts+'</select>';}
  else if(cfg.unit==='inches'){inputCtl='<input id="in_'+ev+'" type="number" inputmode="decimal" placeholder="inches" step="0.5">';}
  else{inputCtl='<input id="in_'+ev+'" type="text" inputmode="numeric" placeholder="0:00 or seconds">';}
  return `<div class="event-card">
    <div class="event-head"><div><div class="name">${cfg.name}</div><div class="meta">Comp Load · ${load}</div></div>${deltaBadge(ev)}</div>
    <div class="scores">
      <div class="score-box"><div class="lbl">Best</div><div class="val">${best?fmtVal(ev,best.value):'—'}</div><div class="sub">${best?best.date:'No log yet'}</div></div>
      <div class="score-box gold"><div class="lbl">2025 Gold</div><div class="val">${podium[0]?.[2]||'—'}</div><div class="sub">${podium[0]?.[1]||'—'}</div></div>
    </div>
    <div class="podium"><div class="ph">2025 Podium · Women 70–74</div>
      ${podium.map(p=>`<div class="podium-row"><span class="place ${p[0]==='GOLD'?'g':p[0]==='SILVER'?'s':'b'}">${p[0]}</span><span class="who">${p[1]}</span><span class="sc">${p[2]}</span></div>`).join('')}
    </div>
    <div class="input-row">${inputCtl}<button id="btn_${ev}" onclick="logScore('${ev}')">Log</button></div>
  </div>`;
}
function renderLog(){document.getElementById('eventList').innerHTML=EVENT_ORDER.map(renderEventCard).join('')}
function renderStatus(){
  document.getElementById('statusList').innerHTML=EVENT_ORDER.map(ev=>{
    const cfg=EVENTS[ev],best=bestScore(ev),gold=PEGGY.podium[ev]?.[0]?.[2]||'—';
    return `<div class="dash-row"><div class="info"><div class="nm">${cfg.name}</div><div class="sb">${PEGGY.loads[ev]}</div></div><div class="vals"><div class="you">${best?fmtVal(ev,best.value):'—'}</div><div class="gold">Gold: ${gold}</div></div>${deltaBadge(ev)}</div>`;
  }).join('');
}
function renderHistory(){
  const list=document.getElementById('historyList');
  if(!cachedLogs.length){list.innerHTML='<div class="empty"><div class="ico">📋</div><div class="msg">No sessions logged yet</div></div>';return}
  const byDate={};cachedLogs.slice().reverse().forEach(l=>{if(!byDate[l.date])byDate[l.date]=[];byDate[l.date].push(l)});
  const dates=Object.keys(byDate).sort().reverse();
  list.innerHTML=dates.map(date=>{
    const rows=byDate[date].map(l=>{const best=bestScore(l.event),isPR=best&&best.date===l.date&&String(best.value)===String(l.value);
      return `<div class="hist-row"><span class="ev">${EVENTS[l.event].name}${isPR?'<span class="pr">PR</span>':''}</span><span class="sc">${fmtVal(l.event,l.value)}</span></div>`;}).join('');
    return `<div class="hist-day"><div class="date">${date}</div>${rows}</div>`;}).join('');
}
function renderStats(){
  const logged=new Set(cachedLogs.map(l=>l.event)).size;document.getElementById('statLogged').textContent=logged+'/10';
  let golds=0;EVENT_ORDER.forEach(ev=>{const del=goldDelta(ev);if(del&&del.pct>=0)golds++;});
  let prs=0;const grouped={};cachedLogs.forEach(l=>{if(!grouped[l.event])grouped[l.event]=[];grouped[l.event].push(l)});
  for(const ev of Object.keys(grouped)){if(grouped[ev].length>1)prs+=Math.max(0,grouped[ev].length-1)}
  document.getElementById('statGold').textContent=golds;document.getElementById('statPRs').textContent=prs;
}
function renderHeader(){
  const now=new Date(),ms=COMP_DATE-now,days=Math.max(0,Math.ceil(ms/(1000*60*60*24)));
  document.getElementById('daysNum').textContent=days;
  const totalDays=Math.ceil((COMP_DATE-BLOCK_START)/(1000*60*60*24)),elapsedDays=Math.max(0,Math.ceil((now-BLOCK_START)/(1000*60*60*24)));
  const weeksTotal=Math.ceil(totalDays/7),weekNow=Math.min(weeksTotal,Math.max(1,Math.ceil(elapsedDays/7)));
  const pct=Math.min(100,Math.max(0,(elapsedDays/totalDays)*100));
  document.getElementById('blockWeek').textContent='Week '+weekNow+' of '+weeksTotal;
  document.getElementById('blockFill').style.width=pct.toFixed(0)+'%';document.getElementById('blockPct').textContent=pct.toFixed(0)+'%';
}
function render(){renderHeader();renderProfile();renderStats();if(currentView==='log')renderLog();if(currentView==='status')renderStatus();if(currentView==='history')renderHistory();}
function setView(v){
  currentView=v;document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  document.getElementById('logView').style.display=v==='log'?'block':'none';
  document.getElementById('statusView').style.display=v==='status'?'block':'none';
  document.getElementById('historyView').style.display=v==='history'?'block':'none';render();
}
function setSyncStatus(state,label){
  const el=document.getElementById('syncIndicator');el.classList.remove('show','syncing','offline');if(state==='hide')return;
  el.classList.add('show');if(state==='syncing')el.classList.add('syncing');if(state==='offline')el.classList.add('offline');
  document.getElementById('syncLabel').textContent=label||(state==='synced'?'Synced':state==='syncing'?'Syncing':'Offline');
  if(state==='synced'){setTimeout(()=>el.classList.remove('show'),1500)}
}
async function logScore(ev){
  const el=document.getElementById('in_'+ev),btn=document.getElementById('btn_'+ev),raw=el.value.trim();
  if(!raw){toast('Enter a value first');return}btn.disabled=true;
  const prevBest=bestScore(ev),today=new Date().toISOString().slice(0,10);
  try{
    setSyncStatus('syncing','Saving');await insertLog(ev,raw,today,null);cachedLogs=await loadLogs();setSyncStatus('synced');
    const newBest=bestScore(ev),isPR=newBest&&(!prevBest||String(prevBest.value)!==String(newBest.value))&&String(newBest.value)===raw;
    el.value='';render();if(isPR&&prevBest)toast('🔥 NEW PR — '+EVENTS[ev].name,true);else if(isPR)toast('Baseline logged');else toast('Logged');
  }catch(e){console.error(e);setSyncStatus('offline','Save failed');toast('Save failed — check connection');}finally{btn.disabled=false}
}
function toast(msg,isPR){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.toggle('pr',!!isPR);t.classList.add('show');
  clearTimeout(window._toastT);window._toastT=setTimeout(()=>t.classList.remove('show'),2200);
}
async function resetAthlete(){
  if(!confirm('Reset all logged data for Peggy? Baselines will be re-seeded.'))return;
  try{setSyncStatus('syncing','Resetting');await deleteAllLogs();cachedLogs=[];await ensureBaselines();setSyncStatus('synced');render();toast('Data reset');}
  catch(e){console.error(e);setSyncStatus('offline','Reset failed');toast('Reset failed')}
}
async function init(){
  try{
    setSyncStatus('syncing','Loading');cachedLogs=await loadLogs();await ensureBaselines();setSyncStatus('synced');
    document.getElementById('loadingScreen').classList.add('hidden');render();
  }catch(e){
    console.error(e);
    document.getElementById('loadingScreen').innerHTML='<div style="text-align:center;padding:20px;color:#fff"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-size:14px;font-weight:700;margin-bottom:6px">Connection failed</div><div style="font-size:12px;opacity:.6;max-width:280px">Check internet and reload.</div></div>';
  }
}
init();
</script>
