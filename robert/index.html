<div class="athlete-switch" id="athleteSwitch" hidden></div>

<nav class="tabbar" role="tablist" aria-label="Athlete views">

  <button class="tab" role="tab" aria-selected="false" aria-controls="logView" data-view="log" onclick="SDSG.setView('log')"><span class="ico">📋</span>Log</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="programView" data-view="program" onclick="SDSG.setView('program')"><span class="ico">📅</span>Program</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="progressView" data-view="progress" onclick="SDSG.setView('progress')"><span class="ico">📈</span>Progress</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="scoutingView" data-view="scouting" onclick="SDSG.setView('scouting')"><span class="ico">🎯</span>Scouting</button>
</nav>

<main>
  <section id="dashboardView"></section>

  <section id="logView" hidden>
    <div id="eventList"></div>
    <div class="foot">
      <details class="danger-zone">
        <summary>⚠ Danger Zone</summary>
        <div class="danger-warn">Wipes ALL logged data for this athlete and re-seeds baselines. For a single mistake, use the 🗑 on the Progress tab instead — this is a full reset.</div>
        <button onclick="SDSG.resetAthlete()">Reset this athlete's data</button>
      </details>
      <div class="foot-credit">Yeager's Gym · SDSG '26</div>
    </div>
  </section>

  <section id="programView" hidden></section>
  <section id="progressView" hidden></section>
  <section id="scoutingView" hidden></section>
</main>
