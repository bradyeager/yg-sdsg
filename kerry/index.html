<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/logo.jpg">
<meta name="theme-color" content="#0A0E17">
<title>SDSG Athlete · Yeager's Gym</title>
<!-- This tracker writes to public.sdsg_logs via athlete_slug. Anonymous (publishable) key, no login. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/sdsg-app.css">
</head>
<body>

<div id="loadingScreen"><div class="spinner"></div><div class="ls-label">Loading</div></div>
<div class="sync-indicator" id="syncIndicator"><span class="dot"></span><span id="syncLabel">Synced</span></div>

<header class="page-header">
  <div class="header-inner">
    <div class="brand">
      <a class="brand-mark" href="/" aria-label="Back to Senior Games home"><img src="/logo.jpg" alt="YG"></a>
      <div class="brand-text">
        <h1 id="brandTitle">Senior Games '26</h1>
        <p>Yeager's Gym · San Diego</p>
      </div>
    </div>
    <div class="header-meta">
      <div class="countdown-chip"><span class="n" id="daysNum">—</span><span class="l">Days to Comp</span></div>
    </div>
  </div>
</header>

<div class="athlete-switch" id="athleteSwitch" hidden></div>

<nav class="tabbar" role="tablist" aria-label="Athlete views">
  <button class="tab active" role="tab" aria-selected="true" aria-controls="dashboardView" data-view="dashboard" onclick="SDSG.setView('dashboard')"><span class="ico">🏠</span>Dashboard</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="logView" data-view="log" onclick="SDSG.setView('log')"><span class="ico">📋</span>Log</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="programView" data-view="program" onclick="SDSG.setView('program')"><span class="ico">📅</span>Program</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="progressView" data-view="progress" onclick="SDSG.setView('progress')"><span class="ico">📈</span>Progress</button>
  <button class="tab" role="tab" aria-selected="false" aria-controls="scoutingView" data-view="scouting" onclick="SDSG.setView('scouting')"><span class="ico">🎯</span>Scouting</button>
</nav>

<main>
  <section id="dashboardView"></section>

  <section id="logView" hidden>
    <div id="eventList"></div>
    <div class="foot">
      <details class="danger-zone">
        <summary>⚠ Danger Zone</summary>
        <div class="danger-warn">Wipes ALL logged data for this athlete and re-seeds baselines. For a single mistake, use the 🗑 on the Progress tab instead — this is a full reset.</div>
        <button onclick="SDSG.resetAthlete()">Reset this athlete's data</button>
      </details>
      <div class="foot-credit">Yeager's Gym · SDSG '26</div>
    </div>
  </section>

  <section id="programView" hidden></section>
  <section id="progressView" hidden></section>
  <section id="scoutingView" hidden></section>
</main>

<div class="toast" id="toast"></div>
