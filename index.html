<meta name="theme-color" content="#0F1620">
<title>San Diego Senior Games · Yeager's Gym Athletes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#48C4CC; --pink:#EF3295; --charcoal:#0F1620; --charcoal-2:#141C28;
  --card:#1A2330; --border:rgba(72,196,204,.2);
  --text:#fff; --text-muted:rgba(255,255,255,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--charcoal);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:480px;width:100%;text-align:center}
.logo{width:80px;height:80px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--pink));padding:3px;margin:0 auto 18px;box-shadow:0 8px 32px rgba(72,196,204,.3)}
.logo img{width:100%;height:100%;border-radius:13px;background:#fff;padding:4px}
.tag{font-size:11px;letter-spacing:2px;color:var(--teal);font-weight:700;text-transform:uppercase}
h1{font-family:'DM Serif Display',serif;font-size:36px;line-height:1.1;margin:6px 0 4px}
.sub{font-size:13px;color:var(--pink);font-weight:600;letter-spacing:.5px;margin-bottom:32px}
.athletes{display:grid;gap:10px;margin-top:24px}
.athlete{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:all .2s;cursor:pointer}
.athlete:hover{border-color:var(--teal);transform:translateY(-1px);box-shadow:0 4px 18px rgba(72,196,204,.15)}
.athlete .left{text-align:left}
.athlete .name{font-family:'DM Serif Display',serif;font-size:20px;line-height:1}
.athlete .div{font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:.5px;font-weight:600}
.athlete .arrow{color:var(--pink);font-size:20px;font-weight:700}
.athlete.placeholder{opacity:.4;cursor:default;pointer-events:none}
.foot{margin-top:36px;font-size:11px;color:var(--text-muted);letter-spacing:1px}
.countdown{display:inline-block;background:rgba(239,50,149,.15);border:1px solid rgba(239,50,149,.3);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--pink);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:8px}
</style>
</head>
